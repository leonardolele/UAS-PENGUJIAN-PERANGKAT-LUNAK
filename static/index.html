<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortlinks.</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <h1 class="text-3xl font-extrabold mb-2 text-center text-indigo-700">Shortlinks.</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Paste Link</label>
                <input type="url" id="longUrl" placeholder="https://example.com" 
                    class="block w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            <button onclick="shortenUrl()" 
                class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200">
                Generate Shortlinks
            </button>  
        </div>

        <div id="result" class="mt-8 pt-6 border-t border-slate-100 hidden">
            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Success! Your link is ready:</p>
            <div class="flex items-center p-1 bg-slate-50 border border-slate-200 rounded-lg">
                <input type="text" id="shortUrl" readonly class="bg-transparent flex-1 text-indigo-600 font-medium px-3 text-sm outline-none">
                <button onclick="copyToClipboard()" class="bg-white text-indigo-600 border border-indigo-100 px-4 py-2 rounded-md text-xs font-bold hover:bg-indigo-50 transition shadow-sm">
                    Copy
                </button>
            </div>
        </div>
    </div>

    <script>
        async function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value;
            const resDiv = document.getElementById('result');
            if(!longUrl) return alert("Please enter a URL");
            
            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ long_url: longUrl })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('shortUrl').value = data.short_url;
                    resDiv.classList.remove('hidden');
                } else {
                    alert('Error: ' + (data.detail || 'Failed to shorten'));
                }
            } catch (err) {
                alert('Server is not responding. Run the app first!');
            }
        }
        function copyToClipboard() {
            const copyText = document.getElementById("shortUrl");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
        }
    </script>
</body>
</html>
